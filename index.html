<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>eventozaki — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0b1628;
      --navy-mid: #112240;
      --gold: #f5c842;
      --gold-dim: #c9a227;
      --white: #f0f4ff;
      --muted: #8892a4;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.09);
      --danger: #ff5f6d;
    }

    body {
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
      overflow: hidden;
      position: relative;
    }

    /* Background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
    }
    .blob1 { width: 500px; height: 500px; background: var(--gold); top: -100px; right: -100px; }
    .blob2 { width: 400px; height: 400px; background: #3a7bd5; bottom: -80px; left: -80px; }
    .blob3 { width: 250px; height: 250px; background: var(--gold); bottom: 30%; left: 30%; opacity: 0.08; }

    .login-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 52px 48px;
      width: 100%;
      max-width: 420px;
      position: relative;
      animation: slideUp 0.6s ease forwards;
      z-index: 1;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      background: var(--gold);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--navy);
      letter-spacing: -1px;
    }

    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 26px;
      letter-spacing: -0.5px;
      color: var(--white);
    }

    .brand h1 span { color: var(--gold); }

    .brand p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input:focus {
      border-color: var(--gold);
      background: rgba(245, 200, 66, 0.06);
    }

    input::placeholder { color: var(--muted); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    .btn-login:hover { background: var(--gold-dim); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: rgba(255, 95, 109, 0.12);
      border: 1px solid rgba(255,95,109,0.3);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }

    .footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--navy);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="login-card">
    <div class="brand">
      <div class="brand-logo">EZ</div>
      <h1>evento<span>zaki</span></h1>
      <p>School Event Registration System</p>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@school.edu" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In to Dashboard</button>
    <div class="error-msg" id="errorMsg"></div>

    <div class="footer-note">eventozaki &copy; 2025 — Admin Portal</div>
  </div>

  <script type="module">
    import { auth } from './firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    window.handleLogin = async function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      if (!email || !password) {
        showError('Please fill in all fields.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';
      err.style.display = 'none';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (e) {
        showError(friendlyError(e.code));
        btn.disabled = false;
        btn.innerHTML = 'Sign In to Dashboard';
      }
    };

    function showError(msg) {
      const err = document.getElementById('errorMsg');
      err.textContent = msg;
      err.style.display = 'block';
    }

    function friendlyError(code) {
      const map = {
        'auth/user-not-found': 'No account found with this email.',
        'auth/wrong-password': 'Incorrect password. Try again.',
        'auth/invalid-email': 'Invalid email address.',
        'auth/too-many-requests': 'Too many attempts. Try again later.',
        'auth/invalid-credential': 'Invalid credentials. Check your email and password.',
      };
      return map[code] || 'Login failed. Please try again.';
    }

    // Enter key support
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleLogin();
    });

    // Redirect if already logged in
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
